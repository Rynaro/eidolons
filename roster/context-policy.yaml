# roster/context-policy.yaml — ECM P1 machine-readable context policy.
# Promoted + trimmed from docs/specs/ecm/policy.yaml (design-comment prose
# dropped; zones/limits/rules/operations/pins/audit/subagents kept verbatim).
# This is the single source of truth 'eidolons context policy' evaluates:
# table-driven, non-LLM, bash 3.2 + jq. First matching rule wins.
# Signals come from .eidolons/.context/meter.json.
ecm_version: "0.1"

zones:
  amber: 0.50
  red: 0.75
  critical: 0.90

limits:
  compaction_depth_cap: 2
  tool_result_share_prune: 0.40
  prompt_path_ms: 300
  memory_timeout_ms: 1500
  handoff_brief_target_tokens: 1500
  handoff_digest_max_tokens: 200
  injected_artifact_max_tokens: 200

rules:
  - id: P1
    when: { budget_ceiling_set: true, budget_spent_gte_ceiling: true }
    operation: wrap_up
  - id: P2
    when: { zone: critical }
    operation: handoff_fresh
  - id: P3
    when: { zone: red, compaction_count_lt: 2 }
    operation: compact
  - id: P4
    when: { zone: red, compaction_count_gte: 2 }
    operation: handoff_fresh
  - id: P5
    when: { zone: amber, tool_result_share_gte: 0.40 }
    operation: prune_tool_results
  - id: P6
    when: { zone: amber }
    operation: externalize
  - id: P7
    when: { zone: [green, unknown] }
    operation: continue

operations:
  continue: {}
  externalize:
    steps: [plan_checkpoint, commit_identifier_manifest, ingest_envelope_if_present]
    crystalium_absent: file_floor_warn
  prune_tool_results:
    steps: [externalize, host_clear_tool_results]
  compact:
    steps: [externalize, host_compact, pin_reinject, pin_verify_repair]
  handoff_fresh:
    steps: [externalize, compose_handoff_brief, ecl_envelope, crystalium_ingest_session_handoff, crystalium_session_end]
  wrap_up:
    steps: [externalize, compose_handoff_brief, ecl_envelope, crystalium_ingest_session_handoff, crystalium_session_end, emit_wrap_up_notice]

pins:
  - cortex_routing_digest
  - active_eidolon_refusal_table
  - esl_enforcement_mode
  - crystalium_trust_tier_map
  - active_plan_step_and_criteria_sha256
  - session_budget_and_compaction_count

audit:
  policy_log: ".eidolons/.context/policy-log.jsonl"
  meter: ".eidolons/.context/meter.json"
  handoff_glob: ".eidolons/.context/handoff-*.md"
  budget_ledger: ".eidolons/.context/budget-ledger.jsonl"

subagents:
  meter: own
  budget: shared_ledger
  operation_remap: { handoff_fresh: finish_and_return, wrap_up: finish_and_return }
