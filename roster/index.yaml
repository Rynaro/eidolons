# Eidolons Roster Registry
# ─────────────────────────
# Canonical list of all Eidolons. The `eidolons` CLI consumes this to resolve
# `eidolons add <name>` to a concrete git repo + version constraint.
#
# Schema: ../schemas/roster-entry.schema.json
# Versioning: bump `registry_version` on any breaking change to this file's shape.

registry_version: "1.0"
updated_at: "2026-04-30T19:40Z"
eiis_required: "1.1"
integrity:
  enforcement: strict  # all shipped Eidolons publish release metadata; mismatches are fatal

# ─── Roster ────────────────────────────────────────────────────────────────────

eidolons:

  - name: atlas
    display_name: ATLAS
    capability_class: scout
    status: shipped
    methodology:
      name: ATLAS
      version: "1.0"
      cycle: "A→T→L→A→S"
      summary: "Read-only codebase intelligence. Structural mapping, bounded probes, evidence-anchored findings."
    source:
      type: github
      repo: Rynaro/ATLAS
      default_ref: main
    versions:
      latest: "1.2.2"
      pins:
        stable: "1.2.2"
      releases:
        1.2.2:
          tag: v1.2.2
          commit: c40b825e47a597211ea6a1d50cf2b51d6a473494
          tree: b39caad797e1706f4d4ea7ac17519e8400498034
          archive_sha256: 194d3ce1b90f18545a98639cf1f00073a04a01e4983ba3011d65386fbdd6db97
          manifest_sha256:
          provenance:
            github_attestation: true
            workflow: .github/workflows/release.yml
    install:
      target_default: "./.eidolons/atlas"
      standalone: true
    handoffs:
      upstream: []
      downstream: [spectra, apivr]
      lateral: [forge, vigil]
    working_set_tokens:
      entry: 900
      target: 3500
    security:
      reads_repo: true
      reads_network: false
      writes_repo: false
      persists: [".atlas/memex/"]
    references:
      - "research/papers/agent-fold.md"
      - "research/papers/scatter-gather.md"
      - "research/production-patterns.md#bounded-aci"

