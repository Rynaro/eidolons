# ─── Presets ───────────────────────────────────────────────────────────────────
# Named bundles for `eidolons init --preset <name>`
presets:
  minimal:
    description: "Solo scout. For read-only exploration of unfamiliar codebases."
    members: [atlas]
  pipeline:
    description: "Full pipeline. Scout → Plan → Build → Chronicle."
    members: [atlas, spectra, apivr, idg]
  plan-and-build:
    description: "Skip scouting and documentation. Plan and implement only."
    members: [spectra, apivr]
  full:
    description: "Every shipped Eidolon — pipeline plus lateral specialists (FORGE, VIGIL)."
    members: [atlas, spectra, apivr, idg, forge, vigil]
  research:
    description: "Scout + chronicle. For understanding and documenting, not changing."
    members: [atlas, idg]
  diagnostics:
    description: "Debug-focused bundle. Implementation + forensic attribution."
    members: [apivr, vigil, forge]
