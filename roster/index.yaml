# ─── Presets ───────────────────────────────────────────────────────────────────
# Named bundles for `eidolons init --preset <name>`
presets:
  minimal:
    description: "Solo scout. For read-only exploration of unfamiliar codebases."
    members: [atlas]
  pipeline:
    description: "Full pipeline. Scout → Plan → Build → Chronicle. (Vivi is the default coder; APIVR-Δ stays opt-in via `eidolons add apivr`.)"
    members: [atlas, spectra, vivi, idg]
  plan-and-build:
    description: "Skip scouting and documentation. Plan and implement only."
    members: [spectra, vivi]
  full:
    description: "The default crew — pipeline plus lateral specialists (FORGE, VIGIL) and the Kupo executor. Single-coder by design; APIVR-Δ is the opt-in conservative fallback (`eidolons add apivr`)."
    members: [atlas, spectra, vivi, idg, forge, vigil, kupo]
  research:
    description: "Scout + chronicle. For understanding and documenting, not changing."
    members: [atlas, idg]
  diagnostics:
    description: "Debug-focused bundle. Implementation + forensic attribution."
    members: [apivr, vigil, forge]
  errands:
    description: "Pipeline plus the low-effort executor — delegate quick localized micro-tasks to Kupo (in_construction until eval-gated)."
    members: [atlas, spectra, apivr, kupo]
