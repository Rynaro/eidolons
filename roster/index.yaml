# Eidolons Roster Registry
# ─────────────────────────
# Canonical list of all Eidolons. The `eidolons` CLI consumes this to resolve
# `eidolons add <name>` to a concrete git repo + version constraint.
#
# Schema: ../schemas/roster-entry.schema.json
# Versioning: bump `registry_version` on any breaking change to this file's shape.

registry_version: "1.0"
updated_at: "2026-04-29T20:30Z"
eiis_required: "1.1"
integrity:
  enforcement: warn  # future registry bump may switch this to strict

# ─── Roster ────────────────────────────────────────────────────────────────────

eidolons:

  - name: atlas
    display_name: ATLAS
    capability_class: scout
    status: shipped
    methodology:
      name: ATLAS
      version: "1.0"
      cycle: "A→T→L→A→S"
      summary: "Read-only codebase intelligence. Structural mapping, bounded probes, evidence-anchored findings."
    source:
      type: github
      repo: Rynaro/ATLAS
      default_ref: main
    versions:
      latest: "1.2.2"
      pins:
        stable: "1.2.2"
    install:
      target_default: "./.eidolons/atlas"
      standalone: true
    handoffs:
      upstream: []
      downstream: [spectra, apivr]
      lateral: [forge, vigil]
    working_set_tokens:
      entry: 900
      target: 3500
    security:
      reads_repo: true
      reads_network: false
      writes_repo: false
      persists: [".atlas/memex/"]
    references:
      - "research/papers/agent-fold.md"
      - "research/papers/scatter-gather.md"
      - "research/production-patterns.md#bounded-aci"

  - name: spectra
    display_name: SPECTRA
    capability_class: planner
    status: shipped
    methodology:
      name: SPECTRA
      version: "4.2"
      cycle: "S→P→E→C→T→R→A"
      summary: "Decision-ready specifications. Scoring rubrics, validation gates, GIVEN/WHEN/THEN stories."
    source:
      type: github
      repo: Rynaro/SPECTRA
      default_ref: main
    versions:
      latest: "4.2.10"
      pins:
        stable: "4.2.10"
    install:
      target_default: "./.eidolons/spectra"
      standalone: true
    handoffs:
      upstream: [atlas]
      downstream: [apivr]
      lateral: [forge, vigil]
    working_set_tokens:
      entry: 900
      target: 3500
    security:
      reads_repo: true
      reads_network: false
      writes_repo: false
      persists: []
    references:
      - "research/production-patterns.md#plan-mode"

  - name: apivr
    display_name: "APIVR-Δ"
    capability_class: coder
    status: shipped
    methodology:
      name: "APIVR-Δ"
      version: "3.0"
      cycle: "A→P→I→V→Δ/R"
      summary: "Brownfield feature implementation. Test-anchored, pattern-first, bounded failure recovery."
    source:
      type: github
      repo: Rynaro/APIVR-Delta
      default_ref: main
    versions:
      latest: "3.0.5"
      pins:
        stable: "3.0.5"
    install:
      target_default: "./.eidolons/apivr"
      standalone: true
    handoffs:
      upstream: [atlas, spectra]
      downstream: [idg]
      lateral: [forge, vigil]
    working_set_tokens:
      entry: 2000
      target: 4500
    security:
      reads_repo: true
      reads_network: false
      writes_repo: true
      persists: [".eidolons/apivr/memories/"]
    references:
      - "research/papers/correctbench.md"
      - "research/papers/reflexion.md"
      - "research/production-patterns.md#failure-recovery"

  - name: idg
    display_name: IDG
    capability_class: scriber
    status: shipped
    methodology:
      name: IDG
      version: "1.1"
      cycle: "I→D→G"
      summary: "Documentation synthesis. Structured markers, CHT verification, provenance-first."
    source:
      type: github
      repo: Rynaro/IDG
      default_ref: main
    versions:
      latest: "1.1.5"
      pins:
        stable: "1.1.5"
    install:
      target_default: "./.eidolons/idg"
      standalone: true
    handoffs:
      upstream: [apivr, spectra, atlas]
      downstream: []
      lateral: [forge, vigil]
    working_set_tokens:
      entry: 900
      target: 2200
    security:
      reads_repo: false
      reads_network: false
      writes_repo: false
      persists: ["docs/"]
    references:
      - "research/papers/docagent.md"
      - "research/papers/correctbench.md"
    aliases: [scribe]  # transitional — accept old name, warn user

  - name: forge
    display_name: FORGE
    capability_class: reasoner
    status: shipped
    methodology:
      name: FORGE
      version: "1.2"
      cycle: "F→O→R→G→E"
      summary: "Deep reasoning for ambiguity, trade-offs, counterfactuals, novel problems."
    source:
      type: github
      repo: Rynaro/FORGE
      default_ref: main
    versions:
      latest: "1.2.1"
      pins:
        stable: "1.2.1"
    install:
      target_default: "./.eidolons/forge"
      standalone: true
    handoffs:
      upstream: []       # lateral consultant — called by any member
      downstream: []
      lateral: [atlas, spectra, apivr, idg, vigil]
    working_set_tokens:
      entry: 1150
      target: 2550
    security:
      reads_repo: false
      reads_network: false
      writes_repo: false
      persists: []
    references: []

  - name: vigil
    display_name: VIGIL
    capability_class: debugger
    status: shipped
    methodology:
      name: VIGIL
      version: "1.0"
      cycle: "V→I→G→I→L"
      summary: "Forensic root-cause attribution. Reproduction-gated, counterfactual-verified, dependency-graph-ranked."
    source:
      type: github
      repo: Rynaro/VIGIL
      default_ref: main
    versions:
      latest: "1.0.3"
      pins:
        stable: "1.0.3"
    install:
      target_default: "./.eidolons/vigil"
      standalone: true
    handoffs:
      upstream: []       # lateral specialist — invoked via APIVR-Δ escalation, user, or orchestrator
      downstream: []
      lateral: [atlas, spectra, apivr, idg, forge]
    working_set_tokens:
      entry: 920
      target: 3500
    security:
      reads_repo: true
      reads_network: false
      writes_repo: false   # default read-only; sandbox never touches tree; write emits verified-patch.diff (never auto-applies)
      persists: [".vigil/config.yml", "memories/vigil-failures.yaml"]
    references:
      - "research/papers/graphtracer.md"
      - "research/papers/agentracer.md"
      - "research/papers/lifecycle-of-failures.md"

# ─── Presets ───────────────────────────────────────────────────────────────────
# Named bundles for `eidolons init --preset <name>`

presets:

  minimal:
    description: "Solo scout. For read-only exploration of unfamiliar codebases."
    members: [atlas]

  pipeline:
    description: "Full pipeline. Scout → Plan → Build → Chronicle."
    members: [atlas, spectra, apivr, idg]

  plan-and-build:
    description: "Skip scouting and documentation. Plan and implement only."
    members: [spectra, apivr]

  full:
    description: "Every shipped Eidolon — pipeline plus lateral specialists (FORGE, VIGIL)."
    members: [atlas, spectra, apivr, idg, forge, vigil]

  research:
    description: "Scout + chronicle. For understanding and documenting, not changing."
    members: [atlas, idg]

  diagnostics:
    description: "Debug-focused bundle. Implementation + forensic attribution."
    members: [apivr, vigil, forge]
