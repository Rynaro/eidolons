name: Roster Intake

on:
  workflow_dispatch:
    inputs:
      eidolon:
        description: Roster member name, e.g. atlas
        required: true
        type: string
      version:
        description: SemVer version without the leading v
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: read

jobs:
  intake:
    name: Intake ${{ inputs.eidolon }} v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Resolve roster source
        id: resolve
        run: |
          set -euo pipefail
          name="${{ inputs.eidolon }}"
          version="${{ inputs.version }}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]] \
            || { echo "::error::version must be SemVer without leading v"; exit 1; }
          repo="$(yq -r ".eidolons[] | select(.name == \"$name\") | .source.repo" roster/index.yaml)"
          [[ -n "$repo" && "$repo" != "null" ]] || { echo "::error::$name not found in roster"; exit 1; }
          # Capture pre-update status + prior-releases-count for the auto-merge
          # carve-out (see "Open pull request" step). Reading current_status
          # *before* the python YAML edit lets us tell first-shipped from a
          # routine bump without inferring from the post-edit state.
          current_status="$(yq -r ".eidolons[] | select(.name == \"$name\") | .status // \"in_construction\"" roster/index.yaml)"
          prior_release_count="$(yq -r "[.eidolons[] | select(.name == \"$name\") | .versions.releases // {} | keys[]] | length" roster/index.yaml)"
          if [[ "$current_status" != "shipped" || "$prior_release_count" -eq 0 ]]; then
            is_first_shipped="true"
          else
            is_first_shipped="false"
          fi
          # Signer-workflow trust anchor. Source-installed Eidolons release via
          # the nexus reusable template (eidolon-release-template.yml), so that
          # is the default signer. OCI-distributed members (e.g. crystalium) ship
          # their own canonical release pipeline and declare it via
          # .release.signer_workflow — a workflow path within their own
          # source.repo. Either way the attestation must come from a known,
          # canonical workflow; this is not a relaxation, only a second anchor.
          signer_rel="$(yq -r ".eidolons[] | select(.name == \"$name\") | .release.signer_workflow // \"\"" roster/index.yaml)"
          if [[ -n "$signer_rel" && "$signer_rel" != "null" ]]; then
            signer_workflow="${repo}/${signer_rel}"
          else
            signer_workflow="${{ github.repository }}/.github/workflows/eidolon-release-template.yml"
          fi
          echo "repo=$repo" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "current_status=$current_status" >> "$GITHUB_OUTPUT"
          echo "is_first_shipped=$is_first_shipped" >> "$GITHUB_OUTPUT"
          echo "signer_workflow=$signer_workflow" >> "$GITHUB_OUTPUT"

      - name: Download release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/eidolon-release
          gh release download "${{ steps.resolve.outputs.tag }}" \
            --repo "${{ steps.resolve.outputs.repo }}" \
            --pattern release-manifest.json \
            --pattern SHA256SUMS \
            --dir /tmp/eidolon-release
          (cd /tmp/eidolon-release && sha256sum --check SHA256SUMS --ignore-missing)

      - name: Verify GitHub artifact attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Require the attestation to come from the member's canonical release
          # workflow (resolved in "Resolve roster source"):
          #   - source-installed Eidolons → the nexus reusable template
          #     (Rynaro/eidolons/.github/workflows/eidolon-release-template.yml),
          #     since reusable workflows sign with the called workflow's identity;
          #   - OCI-distributed members → their own .release.signer_workflow in
          #     source.repo (e.g. Rynaro/CRYSTALIUM/.github/workflows/release.yml).
          # Only signatures from a known canonical workflow are accepted.
          gh attestation verify /tmp/eidolon-release/release-manifest.json \
            --repo "${{ steps.resolve.outputs.repo }}" \
            --signer-workflow "${{ steps.resolve.outputs.signer_workflow }}"

      - name: Validate release manifest
        run: |
          set -euo pipefail
          jq -e \
            --arg repo "${{ steps.resolve.outputs.repo }}" \
            --arg version "${{ inputs.version }}" \
            --arg tag "${{ steps.resolve.outputs.tag }}" '
              .source.repo == $repo and
              .version == $version and
              .tag == $tag and
              (.commit | test("^[0-9a-f]{40}$")) and
              (.tree | test("^[0-9a-f]{40}$")) and
              (.archive_sha256 | test("^[0-9a-f]{64}$")) and
              (.provenance.github_attestation == true)
            ' /tmp/eidolon-release/release-manifest.json >/dev/null

      - name: Update roster and changelog
        run: |
          set -euo pipefail
          name="${{ inputs.eidolon }}"
          version="${{ inputs.version }}"
          manifest=/tmp/eidolon-release/release-manifest.json
          tag="$(jq -r '.tag' "$manifest")"
          commit="$(jq -r '.commit' "$manifest")"
          tree="$(jq -r '.tree' "$manifest")"
          archive_sha="$(jq -r '.archive_sha256' "$manifest")"
          manifest_sha="$(jq -r '.manifest_sha256 // ""' "$manifest")"
          workflow="$(jq -r '.provenance.workflow // ".github/workflows/release.yml"' "$manifest")"
          updated_at="$(date -u +%FT%RZ)"
          export name version tag commit tree archive_sha manifest_sha workflow updated_at
          # Use ruamel.yaml for the roster edit so blank lines and inline
          # comments are preserved across the round-trip. yq -i drops the
          # blank-line separators between Eidolon entries and shifts the
          # spacing on inline `# comment` markers, producing diffs that
          # are dominated by formatting churn rather than the actual
          # versions.releases.<v> addition.
          pip install --quiet ruamel.yaml >/dev/null
          python3 - <<'PY'
          import os
          from pathlib import Path
          from ruamel.yaml import YAML

          yaml = YAML()
          yaml.preserve_quotes = True
          yaml.indent(mapping=2, sequence=4, offset=2)
          yaml.width = 1000  # avoid line-wrap reflow

          path = Path("roster/index.yaml")
          data = yaml.load(path)

          name = os.environ["name"]
          version = os.environ["version"]
          manifest_sha_raw = os.environ["manifest_sha"]
          manifest_sha = manifest_sha_raw if manifest_sha_raw else None

          data["updated_at"] = os.environ["updated_at"]
          for entry in data.get("eidolons", []):
              if entry.get("name") != name:
                  continue
              versions = entry.setdefault("versions", {})
              versions["latest"] = version
              pins = versions.setdefault("pins", {})
              pins["stable"] = version
              releases = versions.setdefault("releases", {})
              releases[version] = {
                  "tag": os.environ["tag"],
                  "commit": os.environ["commit"],
                  "tree": os.environ["tree"],
                  "archive_sha256": os.environ["archive_sha"],
                  "manifest_sha256": manifest_sha,
                  "provenance": {
                      "github_attestation": True,
                      "workflow": os.environ["workflow"],
                  },
              }
              break

          yaml.dump(data, path)
          PY

          # Insert the CHANGELOG bullet under `### Added` inside the
          # `## [Unreleased]` section. Create the subsection if it does
          # not already exist. This keeps Keep-a-Changelog conventions
          # (matches the rest of CHANGELOG.md).
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("CHANGELOG.md")
          text = path.read_text()
          name = os.environ["name"]
          version = os.environ["version"]
          entry = f"- {name} v{version} published in the roster with release integrity metadata."
          if entry in text:
              raise SystemExit(0)

          unreleased = re.search(r"^## \[Unreleased\]\s*$", text, re.MULTILINE)
          if not unreleased:
              raise SystemExit("CHANGELOG.md missing [Unreleased] section")
          start = unreleased.end()
          # Slice from end of [Unreleased] heading to next ## heading (or EOF).
          next_section = re.search(r"^## ", text[start:], re.MULTILINE)
          stop = start + next_section.start() if next_section else len(text)
          section = text[start:stop]

          added = re.search(r"^### Added\s*$", section, re.MULTILINE)
          if added:
              # Append to existing ### Added block (right after the heading).
              insert_at = start + added.end() + 1  # +1 for trailing newline
              new_text = text[:insert_at] + entry + "\n" + text[insert_at:]
          else:
              # Create a new ### Added subsection right after [Unreleased].
              new_text = text[:start] + "\n\n### Added\n" + entry + "\n" + text[start:]
          path.write_text(new_text)
          PY

      - name: Open pull request
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          IS_FIRST_SHIPPED: ${{ steps.resolve.outputs.is_first_shipped }}
        run: |
          set -euo pipefail
          name="${{ inputs.eidolon }}"
          version="${{ inputs.version }}"
          branch="codex/roster-${name}-${version//./-}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add roster/index.yaml CHANGELOG.md
          git commit -m "fix(roster): publish ${name} v${version}"
          git push --set-upstream origin "$branch"
          # First-shipped (in_construction → shipped) transitions and bumps
          # against an empty versions.releases stay DRAFT for human review.
          # Routine post-shipped bumps open as ready-for-review and pair
          # with the auto-merge step below.
          if [[ "$IS_FIRST_SHIPPED" == "true" ]]; then
            body="Automated roster intake for ${name} v${version}. The upstream release manifest checksums and GitHub artifact attestation were verified before this PR was opened."$'\n\n'"> NOTE: First shipped release (or first release after status promotion) for ${name}. Held as DRAFT pending maintainer review."
            pr_url="$(gh pr create --draft --title "fix(roster): publish ${name} v${version}" --body "$body")"
          else
            body="Automated roster intake for ${name} v${version}. The upstream release manifest checksums and GitHub artifact attestation were verified before this PR was opened. Auto-merge will engage once required status checks pass."
            pr_url="$(gh pr create --title "fix(roster): publish ${name} v${version}" --body "$body")"
          fi
          pr_number="$(echo "$pr_url" | sed -E 's|.*/pull/||')"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.resolve.outputs.is_first_shipped != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Auto-merge waits for required status checks (configure on main).
          # If branch protection has not yet been enabled, --auto reduces to
          # immediate merge — that is the maintainer's responsibility.
          # Use SIGTERM-clean failure: do not block the workflow if
          # auto-merge can't be enabled (e.g. branch protection missing).
          if ! gh pr merge --auto --squash "${{ steps.pr.outputs.pr_number }}" -R "${{ github.repository }}"; then
            echo "::warning::Could not enable auto-merge on PR ${{ steps.pr.outputs.pr_number }} — falling back to manual merge. Check branch-protection config."
          else
            echo "Auto-merge enabled on ${{ steps.pr.outputs.pr_url }} (waits for required checks)."
          fi
