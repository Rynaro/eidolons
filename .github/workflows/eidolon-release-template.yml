name: Eidolon Release Template

on:
  workflow_call:
    inputs:
      version:
        description: SemVer version without the leading v
        required: true
        type: string
      test-command:
        description: Optional repository-specific test command to run before release
        required: false
        type: string
        default: ""
      eiis-version:
        description: EIIS major.minor compatibility version
        required: false
        type: string
        default: "1.1"
      ecl-version:
        description: ECL spec version baked into the image label
        required: false
        type: string
        default: "1.0"
      publish-image:
        description: Build and push a GHCR container image satisfying §5.11
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write
  packages: write

jobs:
  release:
    name: Release Eidolon v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SemVer input
        run: |
          set -euo pipefail
          [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]] \
            || { echo "::error::version must be SemVer without leading v"; exit 1; }

      - name: Install release dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq bats shellcheck

      - name: Run repository tests
        if: inputs.test-command != ''
        run: ${{ inputs.test-command }}

      - name: Validate EIIS conformance
        run: |
          set -euo pipefail
          req="${{ inputs.eiis-version }}"
          if [[ "$req" =~ ^[0-9]+\.[0-9]+$ ]]; then
            tag="$(git ls-remote --tags --refs https://github.com/Rynaro/eidolons-eiis \
              | awk -v p="refs/tags/v${req}." '$2 ~ "^"p { sub("refs/tags/v", "", $2); print $2 }' \
              | sort -V | tail -1)"
          fi
          tag="${tag:-$req}"
          git clone --depth 1 --branch "v$tag" https://github.com/Rynaro/eidolons-eiis /tmp/eiis
          set +e
          bash /tmp/eiis/conformance/check.sh "$GITHUB_WORKSPACE"
          rc=$?
          set -e
          case "$rc" in
            0)
              echo "::notice::EIIS conformance passed all MUSTs and SHOULDs"
              ;;
            4)
              echo "::warning::EIIS conformance passed MUSTs with grandfathered SHOULD warnings (exit 4) — release continues"
              ;;
            *)
              echo "::error::EIIS conformance failed (exit $rc)"
              exit "$rc"
              ;;
          esac

      - name: Build release metadata
        id: meta
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          tag="v$version"
          mkdir -p dist
          git archive --format=tar --prefix="${GITHUB_REPOSITORY#*/}-$version/" HEAD -o "dist/source.tar"
          archive_sha="$(sha256sum dist/source.tar | awk '{print $1}')"
          manifest_sha="null"
          if [[ -f install.manifest.json ]]; then
            manifest_sha="\"$(sha256sum install.manifest.json | awk '{print $1}')\""
          fi
          commit="$(git rev-parse HEAD)"
          tree="$(git rev-parse 'HEAD^{tree}')"
          jq -n \
            --arg name "${GITHUB_REPOSITORY#*/}" \
            --arg version "$version" \
            --arg tag "$tag" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg commit "$commit" \
            --arg tree "$tree" \
            --arg archive_sha "$archive_sha" \
            --arg workflow ".github/workflows/release.yml" \
            --argjson manifest_sha "$manifest_sha" \
            '{
              name: $name,
              version: $version,
              tag: $tag,
              source: { type: "github", repo: $repo },
              commit: $commit,
              tree: $tree,
              archive_sha256: $archive_sha,
              manifest_sha256: $manifest_sha,
              provenance: {
                github_attestation: true,
                workflow: $workflow
              }
            }' > dist/release-manifest.json
          (cd dist && sha256sum source.tar release-manifest.json > SHA256SUMS)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "::error::$tag already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: dist/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.meta.outputs.tag }}" dist/* \
            --title "${{ steps.meta.outputs.tag }}" \
            --notes "Automated Eidolon release with checksums and provenance."

  # ── F10-S3: Eidolon container image (§5.11 contract) ──────────────────────
  # Builds and pushes ghcr.io/rynaro/<eidolon>:<version> satisfying the Junction
  # §5.11 image contract. Depends on the release job so the tag exists first.
  # Vendored once in the nexus; all six Eidolons pick this up on their next release.
  # Skip when publish-image=false (e.g. for Eidolons not yet adopting containers).
  docker-image:
    name: Publish Eidolon image v${{ inputs.version }}
    runs-on: ubuntu-latest
    if: inputs.publish-image
    needs: release
    steps:
      - name: Check out Eidolon repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch ecl-io-shim from nexus
        run: |
          set -euo pipefail
          mkdir -p bin
          curl -fsSL \
            "https://raw.githubusercontent.com/Rynaro/eidolons/main/bin/ecl-io-shim" \
            -o bin/ecl-io-shim
          chmod +x bin/ecl-io-shim

      - name: Fetch Dockerfile.eidolon from nexus
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://raw.githubusercontent.com/Rynaro/eidolons/main/docker/Dockerfile.eidolon" \
            -o Dockerfile.eidolon

      - name: Ensure templates/ sentinel exists
        run: |
          set -euo pipefail
          if [ ! -d templates ]; then
            mkdir -p templates
            touch templates/.keep
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: imgmeta
        run: |
          set -euo pipefail
          eidolon_name="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]' | sed 's/-delta$//')"
          eidolon_version="${{ inputs.version }}"
          eidolon_repo="${GITHUB_REPOSITORY}"
          eidolon_revision="$(git rev-parse HEAD)"
          ecl_ver="${{ inputs.ecl-version }}"
          eiis_ver="${{ inputs.eiis-version }}"
          image="ghcr.io/rynaro/${eidolon_name}:${eidolon_version}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "eidolon_name=${eidolon_name}" >> "$GITHUB_OUTPUT"
          echo "eidolon_version=${eidolon_version}" >> "$GITHUB_OUTPUT"
          echo "eidolon_repo=${eidolon_repo}" >> "$GITHUB_OUTPUT"
          echo "eidolon_revision=${eidolon_revision}" >> "$GITHUB_OUTPUT"
          echo "ecl_ver=${ecl_ver}" >> "$GITHUB_OUTPUT"
          echo "eiis_ver=${eiis_ver}" >> "$GITHUB_OUTPUT"

      - name: Build Eidolon container image
        run: |
          set -euo pipefail
          docker build \
            --file Dockerfile.eidolon \
            --build-arg "EIDOLON_NAME=${{ steps.imgmeta.outputs.eidolon_name }}" \
            --build-arg "EIDOLON_VERSION=${{ steps.imgmeta.outputs.eidolon_version }}" \
            --build-arg "EIDOLON_REPO=${{ steps.imgmeta.outputs.eidolon_repo }}" \
            --build-arg "EIDOLON_REVISION=${{ steps.imgmeta.outputs.eidolon_revision }}" \
            --build-arg "ECL_VERSION=${{ steps.imgmeta.outputs.ecl_ver }}" \
            --build-arg "EIIS_VERSION=${{ steps.imgmeta.outputs.eiis_ver }}" \
            --tag "${{ steps.imgmeta.outputs.image }}" \
            .

      - name: Verify §5.11 image contract
        run: |
          set -euo pipefail
          image="${{ steps.imgmeta.outputs.image }}"
          errors=0
          check_label() {
            local key="$1"
            val="$(docker inspect --format "{{ index .Config.Labels \"${key}\" }}" "$image")"
            if [ -z "$val" ]; then
              echo "::error::Missing OCI label: $key"
              errors=$((errors + 1))
            fi
          }
          check_label "org.opencontainers.image.source"
          check_label "org.opencontainers.image.version"
          check_label "org.opencontainers.image.revision"
          check_label "dev.eidolons.ecl-version"
          check_label "dev.eidolons.eiis-version"
          check_label "dev.eidolons.junction-contract"
          check_label "dev.eidolons.phases"
          entrypoint="$(docker inspect --format '{{ json .Config.Entrypoint }}' "$image")"
          if [ "$entrypoint" != '["/eidolon/bin/ecl-io-shim"]' ]; then
            echo "::error::ENTRYPOINT must be [\"/eidolon/bin/ecl-io-shim\"], got: $entrypoint"
            errors=$((errors + 1))
          fi
          user="$(docker inspect --format '{{ .Config.User }}' "$image")"
          if [ "$user" != "65532:65532" ]; then
            echo "::error::USER must be 65532:65532, got: $user"
            errors=$((errors + 1))
          fi
          if [ "$errors" -ne 0 ]; then
            echo "::error::§5.11 image contract verification failed with $errors error(s)"
            exit 1
          fi
          echo "::notice::§5.11 image contract verified"

      - name: Push Eidolon container image to GHCR
        run: |
          set -euo pipefail
          docker push "${{ steps.imgmeta.outputs.image }}"
          digest="$(docker inspect --format '{{ index .RepoDigests 0 }}' "${{ steps.imgmeta.outputs.image }}" | sed 's/.*@//')"
          echo "image_digest=${digest}" >> "$GITHUB_OUTPUT"
        id: push
