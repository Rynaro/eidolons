# Machine-readable companion to spec.md.
# Consumed by APIVR for downstream implementation routing.
# Schema: ad-hoc but stable; mirror keys here when changing spec.md sections.
#
# REVISION 2026-04-26: §11 of spec.md supersedes flag spelling on the upgrade
# command. The `flags`, `decisions.scope`, `decisions.selectivity`, and `tests`
# sections below have been updated in place to reflect the §11 outcome.
# `revision` block at the bottom records what changed and why.

spec_id: eidolons-upgrade
spec_version: "1.1"
status: draft
target_release: "eidolons-cli-v1.1"
authored_by: SPECTRA
authored_at: "2026-04-26"
revised_at: "2026-04-26"
human_decisions_required: false

# ─── Surface ────────────────────────────────────────────────────────────────

command: eidolons upgrade

# Authoritative flag matrix per spec.md §11.4.
# `--nexus` is intentionally absent: the as-shipped (uncommitted) flag was
# renamed to `--system` before release. There is no alias; unknown flag.

flags:
  - name: --check
    type: boolean
    description: >
      Read-only mode. Without --system or --project, inspects both scopes.
      Combine with --system or --project to narrow the report.
    combinable_with: [--system, --project, --json, positional_member]
    conflicts_with_semantically: [--yes, --dry-run]   # silently no-op, not error
  - name: --system
    type: boolean
    description: >
      Operate on the global nexus (~/.eidolons/nexus) — the registry binary
      itself. Replaces the pre-revision --nexus flag (never released).
    mutex_with: [positional_member]
  - name: --project
    type: boolean
    description: >
      Operate on cwd members. Equivalent to bare `eidolons upgrade` when given
      alone. Useful for explicit symmetry with --system and for narrowing
      --check to the project surface only.
    mutex_with: []
  - name: --all
    type: boolean
    description: >
      Upgrade nexus first (must succeed), then members. Equivalent to
      --system --project for mutating runs.
    mutex_with: [positional_member]
    equivalent_to: "--system --project"
  - name: --json
    type: boolean
    description: JSON output on stdout (banner/log lines remain on stderr).
    combinable_with: [--check]
  - name: --yes
    aliases: [-y]
    type: boolean
    description: Skip the confirmation prompt before mutating.
  - name: --non-interactive
    type: boolean
    description: Fail on any interactive prompt. Requires --yes for mutating runs.
  - name: --dry-run
    type: boolean
    description: Show the plan without invoking any fetch or per-Eidolon install.sh.
  - name: -h
    aliases: [--help]
    type: boolean

positional:
  - name: member
    type: string_or_csv
    description: >
      Single member name or comma-separated list. Implies project scope. Must
      match a roster name or alias. Mutex with --system and --all.

# ─── Default behavior (spec.md §11.1) ───────────────────────────────────────

default_scope: project
# Bare `eidolons upgrade` upgrades members in cwd. Same as `--project`.
# Justification: members upgrade ~10x more often than the nexus does
# (per CLAUDE.md "Roster changes" — most frequent commit type).
# Coheres with sync/add/remove/doctor (all default to cwd scope).

# ─── Mutex / equivalence rules (spec.md §11.5) ─────────────────────────────

mutex_rules:
  - rule: "--system + positional_member → exit 2"
    message: "--system operates on the nexus only; member arguments belong to project scope. Drop one or use --all."
  - rule: "--all + positional_member → exit 2"
    message: "--all upgrades every member; drop the positional argument or use <member> without --all."
  - rule: "--system + --project → set ALL=true (NOT an error)"
    message: "Treated as --all; no diagnostic."
  - rule: "--project + positional_member → no error"
    message: "Positional is more specific and stays authoritative; --project is documentation."
  - rule: "--check + (--yes | --non-interactive | --dry-run) → silently no-op"
    message: "No prompts to skip, no mutations to dry-run; redundant flags accepted, not errored on."

# ─── Decisions (cross-references spec.md §4 and §11) ───────────────────────

decisions:
  - id: scope
    spec_section: "4.1 (superseded by 11)"
    resolution: "bare = project (members in cwd); --system = nexus only; --project = explicit equivalent of bare; --all = both"
  - id: version_discovery
    spec_section: "4.2"
    resolution: "git ls-remote for nexus; local roster for members"
  - id: selectivity
    spec_section: "4.3 (superseded by 11.4)"
    resolution: "positional member arg, comma-separated list, --system, --project, --all"
  - id: pin_policy
    spec_section: "4.4"
    resolution: "respect ^/~/= constraints; surface but never auto-jump"
  - id: network_failure
    spec_section: "4.5"
    resolution: "10s timeout; --check degrades gracefully; mutating fails per-member"
  - id: output_format
    spec_section: "4.6"
    resolution: "human-readable default; --json adds structured stdout; action hint references --system"
  - id: rollback
    spec_section: "4.7"
    resolution: "fail-fast at member boundary; no automatic rollback"
  - id: bash_3_2
    spec_section: "4.8"
    resolution: "no associative arrays, no readarray, no wait -n, no &>>"
  - id: idempotency
    spec_section: "4.9"
    resolution: "second run is no-op; lockfile mtime stable when nothing changes"
  - id: sync_boundary
    spec_section: "4.10"
    resolution: "extract install_member helper into lib.sh; sync + upgrade both call it"
  - id: scope_flag_naming
    spec_section: "11"
    resolution: "Proposal A (--system / --project) over Proposal B (split commands). Default stays project-scoped, NOT system-scoped as the user's original Proposal A sketch suggested."
  - id: nexus_flag_compat
    spec_section: "11.6"
    resolution: "Drop --nexus entirely. Never released; no alias, no deprecation. --all kept unchanged."

# ─── Validation gates ───────────────────────────────────────────────────────

validation_gates:
  lint:
    - "shellcheck -x -S error on cli/**/*.sh and cli/eidolons"
    - "no new shellcheck warnings vs main"
  schema:
    - "jq empty schemas/*.json"
    - "yq eval '.' roster/index.yaml"
  bats:
    new_suite: cli/tests/upgrade.bats
    must_not_regress: [cli/tests/init.bats, cli/tests/sync.bats, cli/tests/doctor.bats]
  ci_idempotency:
    location: ".github/workflows/ci.yml job=cli-tests"
    assertion: "second `eidolons upgrade` invocation prints 'up-to-date' and lockfile mtime unchanged"
  bash_3_2:
    runner: macos-latest
    job: cli-tests
  documentation:
    - docs/cli-reference.md
    - cli/eidolons usage()
    - CHANGELOG.md (v1.1 entry; lists --system / --project / --all as the public surface; --nexus is NOT documented as having existed)

