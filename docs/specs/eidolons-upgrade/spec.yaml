# Revision-only delta on top of the as-shipped (uncommitted) implementation,
# per spec.md §11.8–§11.9. APIVR can apply these mechanically.
revision_delta:
  upgrade_sh:
    rename_variable: "NEXUS_ONLY → SYSTEM_ONLY (3 declarations + ~6 uses)"
    add_variable: "PROJECT_ONLY=false"
    argparse:
      replace: "--nexus) NEXUS_ONLY=true → --system) SYSTEM_ONLY=true"
      add: "--project) PROJECT_ONLY=true; shift ;;"
    mutex_block:
      rename_messages: "--nexus → --system in all error strings"
      add_rule: "--system + --project sets ALL=true (degenerate equivalence)"
    dispatch:
      rename: "if NEXUS_ONLY → if SYSTEM_ONLY"
    check_rendering:
      add: "If SYSTEM_ONLY && CHECK → render NEXUS only. If PROJECT_ONLY && CHECK → render MEMBERS only."
    usage_text:
      replace: "--nexus line → --system; insert --project line; update example invocations"
    human_action_hint:
      replace: "'eidolons upgrade --nexus' → 'eidolons upgrade --system'"
  upgrade_bats:
    rename_tests: [T26, T27, T28, T29]   # see test_plan.nexus.renames above
    add_tests: [T32, T33, T34, T35, T36] # see test_plan.added_by_revision above
    help_test_update: "Assertions check presence of --system, --project; absence of --nexus."
  cli_reference_md:
    update_synopsis: "Replace --nexus with --system; add --project line; keep --all"
    update_flag_table: "Replace --nexus row with --system; insert --project row above --all"
    update_network_failure_note: "--nexus reference → --system"
  changelog_md:
    note: "v1.1 entry should list --system / --project / --all as the public surface. Do NOT document --nexus as ever having existed."

# ─── Risk surface (for APIVR) ──────────────────────────────────────────────

risk:
  highest: "Extract install_member from sync.sh to lib.sh. Must not break existing sync tests. Land as separate PR before upgrade.sh implementation."
  medium: "Bash 3.2 portability of with_timeout helper (no `wait -n`). Test on macos-latest runner."
  low: "JSON output schema enforcement; deterministic ordering of members section."
  revision_specific: "Mechanical rename only; low risk. The new --check narrowing path (T34/T35) is the one new code path and is small."

implementation_order:
  - Extract install_member helper
  - Add semver helpers + tests
  - Add nexus probe helpers + tests
  - Implement upgrade --check
  - Implement upgrade --system  # was --nexus pre-revision
  - Implement mutating upgrade (members + --project alias)
  - Implement --all
  - Wire CI idempotency gate, docs, CHANGELOG

# ─── Out of scope ───────────────────────────────────────────────────────────

out_of_scope:
  - "Package-manager publishing (npm/pip/brew) — forbidden by CLAUDE.md"
  - "Auto-editing eidolons.yaml constraint operators"
  - "Downgrading"
  - "Cross-project upgrades (operating outside cwd)"
  - "Auto-chaining nexus self-upgrade with member upgrades in single shell (use --all instead)"
  - "EIIS install-contract version upgrades (handled at sync time via fetch_eiis)"
  - "--prerelease flag for stable-vs-latest divergence (future work; stable == latest in current roster)"
  - "Backwards-compat alias for --nexus (never released; dropped per §11.6)"

# ─── Revision metadata (spec.md §11) ───────────────────────────────────────

revision:
  id: scope-flag-ux-refinement
  date: "2026-04-26"
  authoritative_section: "spec.md §11"
  supersedes_sections: ["§4.1", "§4.3"]
  proposal_chosen: A   # --system / --project flags on the existing upgrade command
  default_scope: project
  rationale_summary: >
    Single-command, single-help-page surface keeps --check cross-scope (its main strength)
    and matches the cwd-default convention of init/sync/add/remove/doctor. Splitting into
    upgrade-system + upgrade-project (Proposal B) was rejected because it would either
    duplicate --check or asymmetrize the help surface. Default stays project-scoped because
    members upgrade ~10x more often than the nexus.
  flag_changes:
    renamed: ["--nexus → --system"]
    added: ["--project"]
    kept: ["--all", "--check", "--json", "--yes", "--non-interactive", "--dry-run", "-h", "--help"]
    dropped: []
  backwards_compat: "None required. --nexus was added in the uncommitted implementation but never released. Dropped outright; no alias, no deprecation warning."

# ─── Auto-handoff signal for APIVR ─────────────────────────────────────────

handoff:
  next_eidolon: apivr
  ready: true
  reason: "Revision is mechanical: variable + flag rename, two new test cases for narrowing, five new bats tests, doc string updates. All decisions resolved with rationale in spec.md §11."
