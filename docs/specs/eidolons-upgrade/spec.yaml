# ─── Output schemas ─────────────────────────────────────────────────────────

output_schemas:
  check_json:
    "$schema": "http://json-schema.org/draft-07/schema#"
    type: object
    required: [nexus, members, summary]
    properties:
      nexus:
        type: object
        required: [current, latest, status]
        properties:
          current:
            type: object
            required: [tag, commit]
            properties:
              tag: { type: [string, "null"] }   # null when not on a tag (detached SHA)
              commit: { type: string }
          latest:
            type: object
            required: [tag]
            properties:
              tag: { type: [string, "null"] }   # null when probe failed (offline)
          status:
            type: string
            enum: [up-to-date, "upgrade available", "unknown (offline)"]
          action:
            type: [string, "null"]              # one-line CLI hint, null when no action
      members:
        type: array
        items:
          type: object
          required: [name, installed, latest, constraint, status]
          properties:
            name: { type: string }
            installed: { type: [string, "null"] }     # null if not-installed
            latest: { type: string }                   # roster.versions.latest
            constraint: { type: string }               # raw eidolons.yaml string
            status:
              type: string
              enum: [up-to-date, "upgrade available", pinned-out, not-installed]
            resolved_commit: { type: [string, "null"] } # from lockfile, null if not-installed
      summary:
        type: object
        required: [nexus_upgrade_available, member_upgrades_available, member_upgrades_pinned_out, members_not_installed]
        properties:
          nexus_upgrade_available: { type: boolean }
          member_upgrades_available: { type: integer, minimum: 0 }
          member_upgrades_pinned_out: { type: integer, minimum: 0 }
          members_not_installed: { type: integer, minimum: 0 }

