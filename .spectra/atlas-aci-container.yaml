    text: "Does Claude Code's mcpServers honour ${workspaceFolder} substitution when command is opaque (docker)?"
    resolution: "Test in G15."
  - id: Q2
    text: "Does Cursor's ~/.cursor/mcp.json accept the same substitution?"
    resolution: "G15 (separately)."
  - id: Q3
    text: "Does Codex's TOML loader support ${workspaceFolder} or expect TOML-native interpolation?"
    resolution: "Inspect Codex docs / atlas-aci hosts/."
  - id: Q4
    text: "Does Copilot's tools.mcp_servers[].command tolerate 16+ entry args list?"
    resolution: "Verify in G15."
  - id: Q5
    text: "Should the digest pin be exposed via env var for self-hosted GHCR mirrors?"
    resolution: "Defer to F4 follow-up."
  - id: Q6
    text: "Does eiis_check need a container-runtime probe?"
    resolution: "No — runtime is aci.sh's concern, not EIIS."

# ─── Follow-ups (out of scope for this spec) ──────────────────────────────
follow_ups:
