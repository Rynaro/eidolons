# Machine-readable summary — ESL change ecm-p2-host-adapters
# Companion to spec.md / acceptance-criteria.md. Frozen doc = acceptance-criteria.md
# (SHA 629b0f10200d9fba6e01c187b9a8af3961953042c2de7a63c4a5335c8573281f).
# Derived faithfully from spec.md + acceptance-criteria.md + amendment-atomos-go.md;
# the acceptance_checks block below is regenerated post-drift-fix so it records the
# TRUTH of what each gate now asserts, not the pre-fix state.
schema: eidolons/change-spec.v1
change_id: ecm-p2-host-adapters
esl_version: "1.1"
tier: full
maker: vivi
checker: vigil
target: "nexus v2.3.0 (ECM P2 — host-adapter recipes: codex/opencode/copilot/cursor)"

rightsize: { score: "6/9", complexity: "10/12 human_loop", confidence: "84 VALIDATE", tradeoff_present: true }

problem: >
  ECM P1 shipped a host-agnostic context kernel (meter math, P1-P7 policy table,
  externalize, handoff) and wired exactly one host — claude-code — through the
  harness. Every other declared host (codex, opencode, copilot, cursor) got nothing,
  and two P1 removal gaps existed (compactThreshold in .claude/settings.json and the
  context: block in eidolons.lock were never stripped by 'harness remove').

decision:
  host_tiers:
    codex: "full ladder (T3) — its channel mirrors claude-code's: SessionStart pins+handoff, UserPromptSubmit meter/policy line, PostToolUse zone-transition refresh, don't-clobber model_auto_compact_token_limit knob"
    opencode: "start + per-prompt (T1) — experimental.chat.system.transform appends a live zone= line; experimental.session.compacting externalizes on compaction"
    copilot: "start-only static (T2) — .github/copilot-instructions.md marker block, re-read each request only (upstream copilot-cli #1139/#2980 block a per-request channel); NO live-meter claim"
    cursor: "static documentary floor (T2) — .cursor/rules/eidolons-context.mdc states the static-only limitation explicitly; no confirmed runtime channel at all"
  posture: "asymmetric-by-honesty and fail-open everywhere — a host with a broken or absent channel still installs a floor and exits 0; no adapter fabricates a channel its host does not expose"
  track_h_retirement: >
    Amendment (2026-07-07, amendment-atomos-go.md): the maintainer decided atomos is
    a GO (committed P3 build). This retires AC-TW-1/AC-TW-2 (the atomos
    delete-at-P2-exit tripwire) without re-cutting the frozen acceptance-criteria.md
    SHA — Tracks A-G (the actual code, 30 checks) are unaffected.
  post_ship_drift_fix: >
    2026-07-12 (this branch, fix/ecm-p2-copilot-handoff): a drift check run after
    five releases (v2.3.0..v2.8.0, change never archived) found AC-CP-2 shipped
    half-true — the copilot block's pin digest was real (queried at install time
    via context_pins_file) but the "Prior session handoff" line was a HARDCODED
    LITERAL that never called _ecm_handoff_digest, and told the user to
    "refresh via 'eidolons harness install'" even though harness install never
    read a handoff record. Fix: _ecm_handoff_digest (previously private to
    harness_hook.sh) lifted verbatim to lib.sh (shared by both harness_hook.sh's
    live SessionStart inject and harness_install.sh's copilot install-time
    snapshot — copilot has no runtime hook channel, so install time is its only
    chance to render this). The copilot block now calls the SAME helper and
    renders either the real queried digest or an honest "none recorded as of
    this install" line — never a false promise. Idempotent: memory preflight's
    own TTL cache (.eidolons/harness/cache/preflight.json) keeps a same-window
    re-install byte-identical (AC-CP-4 unaffected).
  gate_hardening: >
    Three ACs shipped with gates that could not fail, surviving five releases.
    AC-CP-2's bats test grepped for the label 'Prior session handoff' — a
    string the hardcoded literal itself contained, so the gate could never
    catch its own placeholder. AC-CR-2 grepped the WHOLE .mdc file for
    'static', which matches unconditionally in the front-matter
    ('description: ... static floor ...') independent of the marker BODY
    the AC is actually about — a body dishonestly claiming live injection
    still passed. AC-CDX-4's assertion was wrapped in
    `if [[ -n "$output" ]]`, making an empty payload (the primary failure
    mode) a vacuous pass. All three hardened in this branch; see
    verify_method entries below and cli/tests/{harness,context}.bats.

invariants:
  - fail-open-everywhere            # broken/absent channel -> floor + exit 0, never a hang or hard fail
  - honest-static-floor             # no adapter claims a live/per-prompt channel it doesn't have (AC-CP-3/AC-CR-3/AC-OC-4)
  - kernel-untouched                # context.sh/lib_context.sh/context_policy.sh/context_externalize.sh/context_status.sh/context_handoff.sh reused verbatim, never edited
  - policy-served-not-edited        # roster/context-policy.yaml, roster/pins.yaml are read, never modified
  - claude-code-byte-identical      # the P1 claude-code recipe internals are regression-guarded, unaffected by P2/the drift fix
  - marker-bounded-idempotent       # upsert_marker_block/remove_marker_block only; jq -cS / byte-diff before every write
  - bash-3.2-clean                  # no declare -A, ${var,,}/${var^^}, readarray/mapfile, &>>
  - stderr-discipline               # say/ok/info/warn/die -> stderr; stdout reserved for captured helpers
  - no-false-promise                # (drift-fix addition) a fail-open degraded line must never name a command that cannot help

files:
  - cli/src/harness_install.sh
  - cli/src/harness_hook.sh
  - cli/src/harness_remove.sh
  - cli/src/lib.sh                  # drift-fix addition: _ecm_handoff_digest lifted here (shared helper), not in the original 8-glob freeze
  - cli/templates/harness/opencode-eidolons.js
  - schemas/eidolons.lock.schema.json
  - cli/tests/context.bats
  - cli/tests/harness.bats

verify_items:
  - "codex: PostToolUse shim + hooks.json wiring; SessionStart/UserPromptSubmit dialect reused from harness_hook.sh unmodified; don't-clobber config.toml append"
  - "opencode: plugin registers system.transform (live zone= line) + session.compacting (externalize); no per-tool inject claim"
  - "copilot: marker block carries the pin digest AND a queried handoff digest (real content when a record exists; an honest 'none recorded' line when it doesn't) — never a hardcoded placeholder; byte-identical on re-install within the preflight TTL cache window"
  - "cursor: marker BODY (not just file/front-matter) states the static-only limitation and makes no live-injection claim; byte-identical on re-install"
  - "removal parity: compactThreshold + lock context: block + codex knob + copilot block + cursor .mdc all stripped; install->remove->install byte-identical for claude-code"
  - "fail-open: cursor-only install exits 0; unknown zone -> policy continue; unwritable codex config warns + exits 0 with other hosts still wired"
  - "lock: context.per_host records per-host tier; codex_autocompact_managed is boolean"
  - "AC-CP-2 hardened: seeded fake preflight digest content (not just the label) must appear in the block; the old broken 'not available here' promise must be absent"
  - "AC-CR-2 hardened: assertion scoped to the marker BODY via extract_marker_block, not the whole file (defeats the front-matter loophole)"
  - "AC-CDX-4 hardened: `if [[ -n \"$output\" ]]` vacuous-pass guard removed; confirmed green unwrapped (no second defect found)"

