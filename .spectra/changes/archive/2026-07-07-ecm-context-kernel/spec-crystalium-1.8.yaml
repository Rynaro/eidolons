# Drift fence — repo-relative paths in the crystalium repo. Any diff outside is DRIFT.
files_allowed:
  - mcp-server/src/crystalium/__main__.py          # new ingest verb + docstring line (anchor: commit verb :388-571, export :579)
  - mcp-server/tests/test_ingest_cli.py            # NEW (model: test_commit_cli.py)
  - mcp-server/pyproject.toml                      # :8 version SSOT -> 1.8.0
  - mcp-server/src/crystalium/__init__.py          # :8 _FALLBACK_VERSION -> 1.8.0
  - install.sh                                     # :75 fallback literal -> 1.8.0
  - CHANGELOG.md                                   # [1.8.0] entry + consolidate re-deferral

verb_contract:
  name: ingest
  flags:
    - {flag: --envelope, required: true, type: json-string, note: "ECL envelope v1.x/v2.x; json.loads; parse failure = exit 1"}
    - {flag: --payload, required: true, type: string, note: "G7: raw utf-8 bytes must hash to artifact.sha256 when declared"}
    - {flag: --payload-encoding, required: false, default: utf8, choices: [utf8, base64, json]}
    - {flag: --format, required: false, default: json, choices: [json, text]}
    - {flag: --config, required: false, note: "Config.from_yaml if exists else Config.from_env"}
  env:
    CRYSTALIUM_CALLER_TIER: "NOT READ — tier is envelope-derived via resolve_caller_tier MIN-trust (AC-116)"
  parity_source: "_handle_ingest(args, episodic, semantic, procedural, execution, config, recall_cache=None) — server.py:1141, reused verbatim"
  construction: "light one-shot stack (commit-verb precedent): None vector/graph stores; ExecutionLayer(aetheryte=None) default-safe (execution.py:91,119)"
  summary_gate: "none (MCP-ingest parity; commit CLI's hard reject does NOT apply — server-composed summary, D-3)"
  scope: "canonicalized via normalize_write_scope (v1.6; server.py:1209-1213) — NOTE FINDING-107: CLI commit stores scope verbatim; asymmetry documented, not fixed"
  nexus_caller_compat: "lib_context.sh:161 emitted shape works AS-IS — no nexus change for the verb call"

