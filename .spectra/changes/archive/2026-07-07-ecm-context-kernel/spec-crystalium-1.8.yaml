  - {id: AC-104, verify: "pytest test_ingest_cli.py::test_quarantined_session_handoff_still_surfaces_on_recall"}
  - {id: AC-105, verify: "pytest test_ingest_cli.py::test_payload_hash_mismatch_exits_1"}
  - {id: AC-106, verify: "pytest test_ingest_cli.py::test_missing_envelope_field_exits_1"}
  - {id: AC-107, verify: "pytest test_ingest_cli.py::test_unsupported_envelope_version_exits_1"}
  - {id: AC-108, verify: "pytest test_ingest_cli.py::test_envelope_parse_error_exits_1"}
