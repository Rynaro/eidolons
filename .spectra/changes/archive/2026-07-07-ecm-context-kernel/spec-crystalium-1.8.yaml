cross_repo_flags:
  - id: GAP-NEXUS-OBJECTIVE
    severity: blocking-for-canary
    where: "nexus context_handoff.sh:215 (ecm-context-kernel fence, NOT this spec's fence)"
    what: >-
      Envelope objective is static; the canary token lives only in the brief body
      (encoding_context.native_artifact — not FTS-indexed; FTS = summary only,
      relational.py:75; _fts5_query implicit-AND, relational.py:186-202). The
      canary --context-handoff recall leg cannot token-match until the nexus folds
      the --task-state head into the envelope objective.
  - id: NOTE-QUARANTINE-BOTH-LEGS
    severity: informational
    what: >-
      from.eidolon 'eidolons-context-kernel' resolves T3 (not in _ROSTER_EIDOLONS)
      with trace.tier 'standard' non-tier token — BOTH canary legs land quarantined;
      AC-103/AC-104 lock that they land quarantined AND still surface on recall.
  - id: NOTE-MCPS-YAML-LIST
    severity: cosmetic
    what: "nexus roster/mcps.yaml exposes_tools.list enumerates 8 of 9 tools (graph_export missing; glob covers it) — nexus-side, out of fence."

