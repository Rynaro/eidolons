rejected_alternatives:
  - "Extend canary.sh — D-C1 keeps canary human-in-the-loop; compliance is fully automatable"
  - "Hardcode expected targets — drifts from routing.yaml; compute GT live via the deterministic kernel"
  - "Single arm — no baseline; Δ(A−B) is the scientific claim; common-mode biases cancel only in the difference"
  - "Reuse eval routing grading loop — that grades the deterministic kernel; compliance needs live driver + NDJSON parse + pass^k + 2-arm fixtures"
  - "Fixtures that init/sync a real project — would fetch from GitHub (network/slow/non-det); offline stub builder suffices (we measure dispatch, not subagent execution)"
  - "Make --strict/block the default now — premature; the dossier reversal is conditional on THIS measurement"
  - "TRANCE parallel-spec — one bounded CLI module, not multi-service architecture; single-pass cycle is the correct tier"

