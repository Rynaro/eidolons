# Agent hand-off — eidolons eval compliance (A/B routing-compliance instrument)
# SPECTRA planning artifact · 2026-06-11 · campaign harness-mechanization
# Companion to spec-compliance.md. Consumed by the executor (Vivi).
meta:
  spec: spec-compliance.md
  intent: REQUEST
  complexity: 9
  tier: extended
  confidence: 0.88
  decision: AUTO_PROCEED
  handoff_to: vivi
  handoff_role: coder
  model_hint: standard   # sonnet (vivi default); bump to deep only if loop stalls
  read_only_planning: true
  operationalizes: "DOSSIER-HARNESS-2026-06.md:106 (FORGE reversal: advisory compliance <80% on T3 → escalate to block)"
  hard_constraints:
    - "bash 3.2: no declare -A, no ${var,,}/${var^^}, no readarray/mapfile, no &>>"
    - "stderr discipline: stdout = scorecard ONLY (text card or --json)"
    - "no eval of consumer config; fixtures generated mechanically"
    - "offline fixtures: NEVER fetch_eidolon / git clone in the builder"
    - "idempotent fixture build; deterministic except mktemp path"
    - "live driver is the ONLY billed/network path; gated behind --yes"
    - "CI never calls a live model (smoke = fake driver)"

orchestrator_decisions:   # frame within; do not relitigate
  D-C1: "new `eval compliance` mode → cli/src/eval_compliance.sh, dispatched from eval.sh; canary.sh untouched"
  D-C2: "two arms in isolated mktemp fixtures, identical except `harness install`; OFFLINE deterministic build; explicit .claude/settings.json permission allowlist"
  D-C3: "driver = claude -p stream-json, --max-turns default 3, --model default sonnet; pluggable --driver; claude-absent = actionable die, never hang"
  D-C4: "detect Task tool_use events; per-prompt compliance = delegated_any + delegated_correct vs LIVE kernel ground truth; control prompts inverted"
  D-C5: "evals/compliance-suite.yaml (~12-16 prompts, 8 classes + 2-3 controls); behavioral expect (class + control); target supplied live"
  D-C6: "metrics: per-arm delegation_rate/correct_target_rate, per-class, Δ(A−B), GATE vs 80% on arm A, --k pass^k; JSON scorecard; results → .spectra/research/"
  D-C7: "cost discipline: print N×arms×k + model, require --yes; --smoke = fake-driver full pipeline (also the bats path); CI never bills"
  D-C8: "arm-A self-check before measuring (hooks present, shims -x, kernel probe returns a route); abort with diagnostics if instrument broken"

# ── Verified facts (scout, 2026-06-11) — do not re-derive ──────────────────
verified_anchors:
  eval_dispatch: "cli/src/eval.sh:59-65 — eval.sh owns its sub-verbs; NO second allowlist in cli/eidolons (mcp double-allowlist trap does NOT apply)"
  kernel_hook_probe: "echo '{\"prompt\":\"map the auth flow\"}' | eidolons run --hook claude-code --stdin → {hookSpecificOutput:{additionalContext:'Route: atlas ...'}} (PROBED LIVE)"
  kernel_groundtruth: "eidolons run '<prompt>' --json → {decision, selected, tier} (PROBED LIVE: 'spec out the new caching layer' → dispatch/[spectra]/standard)"
  harness_install: "cli/src/harness_install.sh writes to cwd only; merges hooks into .claude/settings.json (lines 497-562); --hosts --non-interactive --force flags exist"
  cortex_present: "EIDOLONS.md at checkout root; mirrored to .eidolons/cortex/EIDOLONS.md by sync; harness_hook.sh session_start reads .eidolons/cortex/EIDOLONS.md"
  roster_helpers: "lib.sh roster_list_names / roster_get; roster/index.yaml has name/display_name/capability_class/methodology.summary; model-profiles.yaml maps tier→string (anthropic: light=haiku/standard=sonnet/deep=opus)"
  agent_stub_shape: ".claude/agents/<name>.md frontmatter: name/description/model/tools; Task subagent_type targets the agent FILENAME (must exist)"
  lib_helpers: "with_timeout SECONDS CMD (bash 3.2 timeout); yaml_to_json; say/ok/info/warn/die all to stderr; empty-array expansion: \"${arr[@]+\\\"${arr[@]}\\\"}\""
  no_prior_art: "no in-repo headless `claude -p` / stream-json parse / Task-detect — all net-new; stream shape host-version-dependent, unverifiable offline"

